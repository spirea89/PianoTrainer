<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PianoTrainer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="trainer" id="trainer">
        <header class="topbar">
          <div>
            <p class="eyebrow">PianoTrainer</p>
            <h1>Play the note on the staff</h1>
          </div>
          <button class="icon-button" id="nextButton" type="button" aria-label="Next random note" title="Next random note">
            <span aria-hidden="true">></span>
          </button>
        </header>

        <section class="staff-wrap" aria-label="Piano staff">
          <svg id="staff" viewBox="0 0 820 360" role="img" aria-labelledby="staffTitle staffDesc">
            <title id="staffTitle">Piano staff with target note</title>
            <desc id="staffDesc">The current random note is shown on a treble staff.</desc>
            <g class="clef" aria-hidden="true">
              <text x="72" y="220">𝄞</text>
            </g>
            <g id="ledgerLines"></g>
            <g class="staff-lines">
              <line x1="140" y1="110" x2="760" y2="110" />
              <line x1="140" y1="145" x2="760" y2="145" />
              <line x1="140" y1="180" x2="760" y2="180" />
              <line x1="140" y1="215" x2="760" y2="215" />
              <line x1="140" y1="250" x2="760" y2="250" />
            </g>
            <g id="noteGroup">
              <ellipse id="noteHead" cx="450" cy="180" rx="31" ry="22" transform="rotate(-18 450 180)" />
              <line id="noteStem" x1="478" y1="175" x2="478" y2="82" />
            </g>
          </svg>
        </section>

        <section class="readout">
          <div class="target">
            <span class="label">Target</span>
            <strong id="targetName">do</strong>
          </div>
          <div class="heard">
            <span class="label">Heard</span>
            <strong id="heardName">--</strong>
          </div>
        </section>

        <section class="meter" aria-label="Microphone input level">
          <div class="meter-head">
            <span class="label">Mic input</span>
            <strong id="levelValue">idle</strong>
          </div>
          <div class="meter-track">
            <div class="meter-bar" id="levelBar"></div>
          </div>
        </section>

        <section class="controls">
          <button class="primary" id="listenButton" type="button">Start listening</button>
          <button class="secondary" id="skipButton" type="button">Next note</button>
        </section>

        <p class="hint" id="statusText">Allow microphone access, then play the displayed note.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
